# Japanese dispatchable generation fleet — hand-curated public-knowledge seed.
#
# Loaded by `python -m stack.load_generators`. UPSERT keyed on
# (name, area_id, operator).
#
# Coverage philosophy:
#   - Top dispatchable units (≥100 MW) per area: thermal (LNG/coal/oil),
#     nuclear, pumped-storage. ~60 units total.
#   - Variable renewables (solar, wind, run-of-river hydro) are NOT here —
#     the stack engine handles them via `generation_mix_actuals` actuals
#     or `stack/weather_proxy.py` for VRE capacity reduction.
#
# Data caveats:
#   - Capacity values are nameplate rated capacity, drawn from public
#     utility / METI / Japan Atomic Industrial Forum (JAIF) reports.
#     Cross-checked against company press releases where possible.
#   - Efficiencies are LITERATURE DEFAULTS by (fuel, unit_type) — not
#     unit-specific test results. Real-fleet HHV efficiencies for similar
#     vintage and configuration. Acceptable for stack-model purposes;
#     sensitivity analysis will flag if any unit's efficiency materially
#     swings the marginal price for a slot.
#   - Variable O&M and CO2 intensities are IEA / IPCC defaults per fuel
#     family. Do not treat as bid-book quality.
#   - Nuclear units list nameplate; the engine reads `generator_availability`
#     for actual operability. Most Japanese nuclear units are offline as
#     of 2026-05; only Kansai (Ohi 3-4, Takahama 3-4, Mihama 3), Kyushu
#     (Sendai 1-2, Genkai 3-4), Shikoku (Ikata 3) routinely operate.
#
# Sources for spot-checking:
#   - METI ENECHO 電力調査統計 (Power Survey Statistics): https://www.enecho.meti.go.jp/statistics/electric_power/ep002/
#   - JAIF reactor status: https://www.jaif.or.jp/en/operation-status-of-nuclear-power-plants-in-japan/
#   - Each utility's IR / annual report (TEPCO PG, Kansai, Chubu, etc.)
#
# Replace this YAML with a more authoritative source (e.g. paid Argus /
# OCCTO data) when one becomes available — the loader is idempotent.

